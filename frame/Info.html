<!DOCTYPE html>
<html lang="ru">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<head>
<meta charset="UTF-8">
<title>ЖК Дмитриевский Консьерж</title>
<style>
html {
background: black;
}
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Comfortaa', cursive;
		font-weight: 700; /* Жирное начертание для логотипа */
        color: black;
    }

    .container {
        width: 1080px;
        height: 1920px;
        background: #eec11e;
        border-radius: 40px;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .block {
        flex-shrink: 1;
        border-radius: 30px;
    }

    /* Первый блок */
    .top-block {
        display: flex;
        gap: 20px;
		
    }

    .square {
		
        flex: 1;
        
        border-radius: 30px;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-size: 78px;
        text-align: center;
		border: 10px solid white;
    }

    .square svg {
        width: 60%;
        height: auto;
    }

    /* Блоки текста */
    .info-block {
		background: #eec11e;
		color: white;
		padding: 40px;
		font-size: 60px;
		display: flex;
		flex-direction: column;
		/*justify-content: center;*/
		border-radius: 30px;
		border: 10px solid white;
    }
  .containerr {
    display: grid;
    /* Создаем две колонки */
    grid-template-columns: 1fr 1fr; 
    /* Расстояние между всеми блоками (можно менять) */
    gap: 20px; 
    width: 100%;
    max-width: 600px;
	
  }

  .blockk {
    padding: 20px;
    text-align: center;
	border-radius: 20px;
	font-size: 45px;
	display: flex;
	align-items: center;    
    justify-content: center;
	transition: background-color 0.5s ease, box-shadow 0.5s ease;
	background-color: white; 
	color: #eec11e;
	text-align: center;
  }
  
/* Класс для "красного" состояния */
.lift-danger {
  background-color: #ff4d4d !important; /* Красный фон */
  color: white;                        /* Белый текст для контраста */
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
}

/* позиции */
.b1{grid-column:2;grid-row:1}
.b2{grid-column:1;grid-row:2;width:50%;justify-self:end}
.b3{grid-column:2;grid-row:2}
  
  .container3 {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  
}

.left {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 40%;
}

.left img {
 width: 100%;
 border-radius: 20px;
 border-style: solid;
 box-sizing: border-box;
}

.right {
  width: 60%;
  /*display: flex;
  flex-direction: column;*/

	  display: grid;
	/* Создаем две колонки */
	grid-template-columns: 1fr 1fr; 
	/* Расстояние между всеми блоками (можно менять) */
	gap: 20px; 
	/*width: 100%;*/
	max-width: 600px;
	justify-content:center;
}

.box {
  height: 100px;
  background-color: gray;
}

/* Описываем саму анимацию «дыхания» */
@keyframes pulse-red {
  0% {
    box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.5);
    border-color: rgba(255, 0, 0, 0.5);
  }
  50% {
    box-shadow: 0 0 25px 10px rgba(255, 0, 0, 0.8);
    border-color: rgba(255, 0, 0, 1);
  }
  100% {
    box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.5);
    border-color: rgba(255, 0, 0, 0.5);
  }
}

/* Класс, который мы будем вешать на картинку */
.pulse-active {
 /* border: 2px solid red;*/
  animation: pulse-red 2s infinite ease-in-out;
  transition: all 0.5s ease;
}

.your-class {
  /* Это превратит любой цвет в красный */
  filter: brightness(0) saturate(100%) invert(15%) sepia(95%) saturate(6932%) hue-rotate(358deg) brightness(95%) contrast(112%);

}
	
.image-container {
    width: 184px;
    height: 184px;
}
	
.image-container:has(img.your-class) {
  position: relative;
  display: inline-block;
  z-index: 1;
}

.image-container:has(img.your-class)::before {
  content: "";
  position: absolute;
  top: 5px;  /* Смещение вниз */
  left: 5px; /* Смещение вправо */
  width: 90%;
  height: 90%;
  background-color: white;
  z-index: -1; /* Уводит блок за картинку */
  border-radius: 20px;
}
.info-block:nth-child(2) {
 height:340px;
}

.info-block:nth-child(4) {
 padding: 20px;
 font-size: 50px;
 flex-grow: 1;
}

</style>
</head>
<body>

<div class="container">

    <!-- 1 блок -->
    <div class="block top-block">
        <div class="square1">
            <!-- SVG пример -->
			<img src="../svg/dmit7.svg" alt="SVG"  height="340">

        </div>

        <div class="square" id="dateBlock">
            <!-- Дата вставится через JS -->
        </div>
    </div>

    <!-- 2 блок -->
    <div class="block info-block">
        <div id="concierge"></div>
    </div>

    <!-- 3 блок -->
    <div class="block info-block">    
		<div class="container3">
			  <div class="left">
				<div class="image-container"><img id="s" src = "../svg/s.svg"></div>
				<div class="image-container"><img id="a" src = "../svg/a.svg"></div>
				<div class="image-container"><img id="c" src = "../svg/c.svg"></div>
				<div class="image-container"><img id="h" src = "../svg/h.svg"></div>
			  </div>

			  <div class="right">
				<div class="blockk b1" id="L3">3<br>Лифт</div>
				<div class="blockk b2" id="L1">1<br>Лифт</div>
				<div class="blockk b3" id="L2">2<br>Лифт</div>
			  </div>
			</div>
    </div>

    <!-- 4 блок -->
    <div class="block info-block">
        <div id="comment"></div>

    </div>

</div>
<script src="https://malvitgenps5-gif.github.io/.github.io/js/crypto-js.min.js"></script>
<script>
const d=new Date();
const m=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
dateBlock.innerHTML=`<div>${d.getDate()}</div><div>${m[d.getMonth()]}</div><div>${d.getFullYear()}</div>`;

	function decryptAES(ciphertext, key) {
    try {
        const bytes = CryptoJS.AES.decrypt(ciphertext, key);
        const originalText = bytes.toString(CryptoJS.enc.Utf8);
        if (!originalText) {
            return "Ошибка: Неверный ключ или поврежденные данные";
        }
        return originalText;
    } catch (error) {
        return "Ошибка при расшифровке: " + error.message;
    }
}
/* ДАННЫЕ */

async function getSharedData() {
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=469920882&single=true&output=csv';
    const CACHE_KEY = 'sheet_data';
    const TIMESTAMP_KEY = 'sheet_timestamp';
    const TTL = 5 * 60 * 1000;

    const cached = localStorage.getItem(CACHE_KEY);
    const lastUpdate = localStorage.getItem(TIMESTAMP_KEY);
    const now = Date.now();

    if (cached && lastUpdate && (now - lastUpdate < TTL)) {
        return cached;
    }

    try {
		console.log('Фрейм делает сетевой запрос...');
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error('Network response was not ok'); // Проверка статуса
        
        const data = await response.text();
        localStorage.setItem(CACHE_KEY, data);
        localStorage.setItem(TIMESTAMP_KEY, now.toString());
        return data;
    } catch (err) {
        console.error('Ошибка загрузки:', err);
        return cached || ""; // Возвращаем пустую строку, если кэша тоже нет
    }
}

getSharedData().then(csv => {
    if (!csv) return;

    const rows = csv.split(/\r?\n/).filter(row => row.trim() !== "");
    const headers = rows[0].split(",").map(h => h.trim().toLowerCase());
    
    const poleIdx = headers.indexOf("pole");
    const paramIdx = headers.indexOf("param");

    // Создаем карту (объект) для быстрого поиска: { pole: param }
    const dataMap = {};
    const resultData = rows.slice(1).map(rowStr => {
        const row = rowStr.split(",");
        const pole = row[poleIdx]?.trim() || "";
        const param = row[paramIdx]?.trim() || "0";
        dataMap[pole] = param;
		
        return { pole, param };
    })
	.filter(item => item.pole !== "");
    // --- Логика обновления интерфейса ---
    
    // Заполняем текстовые блоки, если они есть в CSV
    if (document.getElementById('concierge')) 
        document.getElementById('concierge').innerHTML = decryptAES(dataMap.concierge || "", ".^O4K5#ZSq$;,)s!Yh9Q");
	
	const commentElement = document.getElementById('comment');
	if (commentElement) {
		const c1 = dataMap.comment1;
		const c2 = dataMap.comment2 || "";

		// Проверяем: не null/undefined, не пустая строка (после trim) и не ноль
		const isValid = (val) => val !== undefined && val !== null && String(val).trim() !== "" && val !== 0 && val !== "0";

		commentElement.innerHTML = isValid(c1) ? decryptAES(c1, ".^O4K5#ZSq$;,)s!Yh9Q"): c2;
	}

    const relations = ["s", "a", "c", "h"];
    const lifts = ["L1", "L2", "L3"];

    // Обрабатываем индикаторы
    [...relations, ...lifts].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;

        const val = dataMap[id]?.trim();

        // Если значение "0", активируем пульсацию
        el.classList.toggle("pulse-active", val === "0");

        // Специфические классы для лифтов и остальных блоков
        if (lifts.includes(id)) {
            el.classList.toggle("lift-danger", val === "0");
        } else {
            el.classList.toggle("your-class", val === "0");
        }
    });

    console.log('Данные обработаны и применены. Строк:', resultData.length);
});
</script>

</body>
</html>
