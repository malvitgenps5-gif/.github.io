<!DOCTYPE html>
<html lang="ru">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<head>
<meta charset="UTF-8">
<title>ЖК Дмитриевский Консьерж</title>
<style>
html {
background: black;
}
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Comfortaa', cursive;
		font-weight: 700; /* Жирное начертание для логотипа */
        color: black;
    }

    .container {
        width: 1080px;
        height: 1920px;
        background: #eec11e;
        border-radius: 40px;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .block {
        flex: 1;
        border-radius: 30px;
    }

    /* Первый блок */
    .top-block {
        display: flex;
        gap: 20px;
		
    }

    .square {
		
        flex: 1;
        
        border-radius: 30px;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-size: 78px;
        text-align: center;
		border: 10px solid white;
    }

    .square svg {
        width: 60%;
        height: auto;
    }

    /* Блоки текста */
    .info-block {
		background: #eec11e;
		color: white;
		padding: 40px;
		font-size: 60px;
		display: flex;
		flex-direction: column;
		/*justify-content: center;*/
		border-radius: 30px;
		border: 10px solid white;
    }
  .containerr {
    display: grid;
    /* Создаем две колонки */
    grid-template-columns: 1fr 1fr; 
    /* Расстояние между всеми блоками (можно менять) */
    gap: 20px; 
    width: 100%;
    max-width: 600px;
	
  }

  .blockk {
    padding: 20px;
    background: #a8f1d1;
    /*border: 2px solid #333;
    text-align: center;*/
	border-radius: 20px;
	font-size: 30px;
	display: flex;
	align-items: center;    
    justify-content: center;
	transition: background-color 0.5s ease, box-shadow 0.5s ease;
  }
  
/* Класс для "красного" состояния */
.lift-danger {
  background-color: #ff4d4d !important; /* Красный фон */
  color: white;                        /* Белый текст для контраста */
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
}

  .b1 {
    /* Помещаем первый блок во вторую колонку первой строки */
    grid-column: 2;
    grid-row: 1;
	
  }

  .b2 {
    /* Второй блок: первая колонка, вторая строка */
    grid-column: 1;
    grid-row: 2;
	width: 50%;
	justify-self: end;
  }

  .b3 {
    /* Третий блок: вторая колонка, вторая строка */
    grid-column: 2;
    grid-row: 2;
  }
  
  .container3 {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  
}

.left {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 40%;
}

.left img {
 width: 100%;
 border-radius: 20px;
 border-style: solid;
 box-sizing: border-box;
}

.right {
  width: 60%;
  /*display: flex;
  flex-direction: column;*/

	  display: grid;
	/* Создаем две колонки */
	grid-template-columns: 1fr 1fr; 
	/* Расстояние между всеми блоками (можно менять) */
	gap: 20px; 
	/*width: 100%;*/
	max-width: 600px;
	justify-content:center;
}

.box {
  height: 100px;
  background-color: gray;
}

/* Описываем саму анимацию «дыхания» */
@keyframes pulse-red {
  0% {
    box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.5);
    border-color: rgba(255, 0, 0, 0.5);
  }
  50% {
    box-shadow: 0 0 25px 10px rgba(255, 0, 0, 0.8);
    border-color: rgba(255, 0, 0, 1);
  }
  100% {
    box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.5);
    border-color: rgba(255, 0, 0, 0.5);
  }
}

/* Класс, который мы будем вешать на картинку */
.pulse-active {
  border: 2px solid red;
  border-radius: 8px; /* Опционально: скруглит углы, если нужно */
  animation: pulse-red 2s infinite ease-in-out;
  transition: all 0.5s ease;
}
</style>
</head>
<body>

<div class="container">

    <!-- 1 блок -->
    <div class="block top-block">
        <div class="square1">
            <!-- SVG пример -->
			<img src="..svg/dmit7.svg" alt="SVG"  height="395">

        </div>

        <div class="square" id="dateBlock">
            <!-- Дата вставится через JS -->
        </div>
    </div>

    <!-- 2 блок -->
    <div class="block info-block">
        <div id="concierge"></div>
    </div>

    <!-- 3 блок -->
    <div class="block info-block">
        <div>Информация</div>
		<div class="container3">
			  <div class="left">
				<img id="img1">
				<img id="img2">
				<img id="img3">
				<img id="img4">
			  </div>

			  <div class="right">
				<div class="blockk b1" id="box3">Лифт 3</div>
				<div class="blockk b2" id="box1">Лифт 1</div>
				<div class="blockk b3" id="box2">Лифт 2</div>
			  </div>
			</div>
    </div>

    <!-- 4 блок -->
    <div class="block info-block">
        <div id="comment"></div>

    </div>

</div>

<script>
    const dateBlock = document.getElementById("dateBlock");
    const now = new Date();

    const months = [
        "января", "февраля", "марта", "апреля",
        "мая", "июня", "июля", "августа",
        "сентября", "октября", "ноября", "декабря"
    ];

    const day = now.getDate();
    const month = months[now.getMonth()];
    const year = now.getFullYear();

    dateBlock.innerHTML = `
        <div>${day}</div>
        <div>${month}</div>
        <div>${year}</div>
    `;
	const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=964373523&single=true&output=csv"

    async function loadData() {

    const res = await fetch(sheetURL)
        const text = await res.text()

        const rows = text.trim().split("\n").slice(1)

        const data = rows.map(r => {
            const[Pole, Param] = r.split(",")

                return {
                Pole: String(Pole),
                Param: String(Param)
            }
        })

        updateImages(data)

}

	function updateImages(data) {
	  const map = {};
	  data.forEach(d => map[d.Pole] = d.Param);

	  document.getElementById("img1").src = `png/s_${map["s"]}.png`;
	  document.getElementById("img2").src = `png/a_${map["a"]}.png`;
	  document.getElementById("img3").src = `png/c_${map["c"]}.png`;
	  document.getElementById("img4").src = `png/h_${map["h"]}.png`;
	  document.getElementById("concierge").innerHTML = `${map["concierge"]}`;
	  document.getElementById("comment").innerHTML = `${map["comment"]}`;
	  
	  const relations = {
		"img1": "s",
		"img2": "a",
		"img3": "c",
		"img4": "h",
		"box1": "L1",
		"box2": "L2",
		"box3": "L3"
	  };


		Object.keys(relations).forEach(id => {
		  const key = relations[id];
		  const value = map[key];
		  const element = document.getElementById(id);

		  if (value && value.trim() === "0") {
			// Включаем пульсацию
			element.classList.add("pulse-active");
		  } else {
			// Выключаем пульсацию
			element.classList.remove("pulse-active");
			element.style.border = "2px solid transparent"; // сброс рамки
			element.style.boxShadow = "none";
		  }
		});
		
		const liftRelations = {
		  "box1": "L1", // ID блока : Ключ в вашей таблице (Pole)
		  "box2": "L2",
		  "box3": "L3"
		};

		Object.keys(liftRelations).forEach(id => {
		  const key = liftRelations[id];
		  const value = map[key];
		  const element = document.getElementById(id);

		  if (element) {
			// Если значение равно "1", добавляем красный класс
			if (value && value.trim() === "0") {
			  element.classList.add("lift-danger");
			} else {
			  element.classList.remove("lift-danger");
			}
		  }
		});
		
	}
loadData()	
</script>

</body>
</html>
