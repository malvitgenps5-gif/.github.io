<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЖК Дмитриевский</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
  }

  .screen {
    width: 1080px;
    height: 1920px;
    position: relative;
    background: black;
    margin: 0 auto;
  }

  /* Общий контейнер, где логотипы лежат друг на друге */
  .logo-container {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1024px;
    height: 1024px;
    transform: translate(-50%, -50%);
  }

  /* Базовый стиль обертки-шторки */
  .wrapper {
    position: absolute;
    top: 0;
    height: 100%;
    overflow: hidden; /* Скрывает часть картинки */
    transform: translateZ(0);
  }

  .logo {
    width: 1024px;
    height: 1024px;
    position: absolute;
    top: 0;
    display: block;
  }

  /* ЛЕВАЯ ШТОРКА: крепится слева, растет вправо */
  .reveal-left {
    left: 0;
    width: 0;
    animation: revealWidth 5s ease-in-out forwards;
  }
  .reveal-left .logo {
    left: 0; /* Картинка прижата к левому краю и не движется */
  }

  /* ПРАВАЯ ШТОРКА: крепится справа, растет влево */
  .reveal-right {
    right: 0;
    width: 0;
    animation: revealWidth 5s ease-in-out forwards;
  }
  .reveal-right .logo {
    right: 0; /* Картинка прижата к правому краю и не движется */
  }

  @keyframes revealWidth {
    from { width: 0; }
    to   { width: 100%; } /* Раскрываем контейнер на всю ширину */
  }
</style>
</head>
<body>

<div class="screen">
  <div class="logo-container">
    
    <!-- Проявляется слева направо -->
    <div class="wrapper reveal-left">
      <img src="../svg/dmit8_2.svg" class="logo">
    </div>

    <!-- Проявляется справа налево -->
    <div class="wrapper reveal-right">
      <img src="../svg/dmit8_1.svg" class="logo">
    </div>

  </div>
</div>

</body>
</html>
