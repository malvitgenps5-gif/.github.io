<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>ЖК Дмитриевский</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.screen {
  width: 1080px;
  height: 1920px;
  /*position: relative;*/
  overflow: hidden;
  background: black;
}

.screen img {
  position: absolute;
  top: 50%;
  left: 50%;
  max-width: 100%;
  max-height: 100%;
  transform: translate(-50%, -50%);
}

/* Слева направо */
.reveal-logo1 {
  animation: revealLeft 5s ease-in-out forwards;
}

/* Справа налево */
.reveal-logo2 {
  animation: revealRight 5s ease-in-out forwards;
}

@keyframes revealLeft {
  from { clip-path: inset(0 100% 0 0); } /* скрыт справа */
  to   { clip-path: inset(0 0 0 0); }
}

@keyframes revealRight {
  from { clip-path: inset(0 0 0 100%); } /* скрыт слева */
  to   { clip-path: inset(0 0 0 0); }
}
</style>
</head>

<body>

<div class="screen">
<img src="../svg/dmit8_2.svg" class="reveal-logo1" alt="Логотип">
<img src="../svg/dmit8_1.svg" class="reveal-logo2" alt="Логотип">
 

</div>

</body>
</html>
