<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖК Дмитриевский</title>
    <style>
		@font-face {
			font-family: 'AlehoScribble';
			src: url('Aleho Scribble Outer.otf') format('opentype');
			font-weight: normal;
			font-style: normal;
			font-display: swap;
		}

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Возвращен черный фон */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viewport {
            width: 1080px;
            height: 1920px;
            background-color: #000000; /* Возвращен черный фон */
            overflow: hidden;
            position: relative;
            transform-origin: center center;
            flex-shrink: 0;
        }

        .header {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 10px;
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.85); /* Возвращена черная подложка */
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            color: #ffffff; /* Надпись остается БЕЛОЙ */
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 10;
            box-sizing: border-box;
            border-bottom: 2px solid #500;
        }


    </style>
</head>
<body>

<div id="viewport">
    <div class="header">
        Консьерж НК3 <span id="current-month"></span>
    </div>
    <div id="grid"></div>
    <canvas id="matrix" width="1080" height="1920"></canvas>
</div>

<script>
    const now = new Date();
    const month = String(now.getMonth() + 1).padStart(2, '0'); 
    const year = now.getFullYear();
    document.getElementById('current-month').innerText = `${month}/${year}`;

    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // --- ПАРАМЕТРЫ ОТОБРАЖЕНИЯ ---
    const fontSize = 700; // Ваш текущий размер шрифта
    let redRoomIds = [];          

    // Вычисляем точный центр свободной области под шапкой (высота шапки 180px)
    const centerX = canvas.width / 2;
    const centerY = 180 + (canvas.height - 180) / 2;

    async function getSharedData() {
        const CSV_URL =  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=469920882&single=true&output=csv'; 
        const CACHE_KEY = 'sheet_data';
        const TIMESTAMP_KEY = 'sheet_timestamp';
        const TTL = 5 * 60 * 1000;

        const cached = localStorage.getItem(CACHE_KEY);
        const lastUpdate = localStorage.getItem(TIMESTAMP_KEY);
        const currentNow = Date.now();

        if (cached && lastUpdate && (currentNow - lastUpdate < TTL)) {
            return cached;
        }

        try {
            console.log('Фрейм делает сетевой запрос...');
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.text();
            localStorage.setItem(CACHE_KEY, data);
            localStorage.setItem(TIMESTAMP_KEY, currentNow.toString());
            return data;
        } catch (err) {
            console.error('Ошибка загрузки:', err);
            return cached || "";
        }
    }

    function updateData() {
        getSharedData().then(csv => {
            if (!csv) return;

            const rows = csv.split(/\r?\n/).filter(row => row.trim() !== "");
            const headers = rows[0].split(",").map(h => h.trim().toLowerCase());
            
            const idIdx = headers.indexOf("id");
            const currentIdx = headers.indexOf("current");

            const currentRedList = [];
            
            rows.slice(1).forEach(rowStr => {
                const row = rowStr.split(",");
                const id = parseInt(row[idIdx]?.trim());
                const current = row[currentIdx]?.trim() || "0";
                
                if (!isNaN(id) && id >= 1 && id <= 192 && current === "0") {
                    currentRedList.push(id);
                }
            });

            // Сортируем массив по возрастанию ID, чтобы гарантировать строгий порядок отображения
            redRoomIds = currentRedList.sort((a, b) => a - b);
            console.log('Данные обновлены. Красных квартир:', redRoomIds.length);

            // Запускаем переключение на следующий элемент
            showNextNumber();
        });
    }

    function showNextNumber() {
        if (redRoomIds.length === 0) {
            // Если красных квартир нет, просто очищаем холст
            drawNumber(null);
            return;
        }

        // Читаем из кэша ID последней показанной квартиры
        const lastShownId = parseInt(localStorage.getItem('last_shown_room_id'));
        let nextIndex = 0;

        if (!isNaN(lastShownId)) {
            // Ищем, на каком индексе в новом массиве находится прошлая квартира
            const lastIndex = redRoomIds.indexOf(lastShownId);

            if (lastIndex !== -1) {
                // Если нашли, берем следующую по порядку
                nextIndex = lastIndex + 1;
            } else {
                // Если прошлая квартира пропала из списка «красных»,
                // ищем ближайшую большую по номеру, чтобы не сбивать общую последовательность
                nextIndex = redRoomIds.findIndex(id => id > lastShownId);
                if (nextIndex === -1) nextIndex = 0;
            }
        }

        // Если дошли до конца списка, сбрасываем указатель на начало (зацикливание)
        if (nextIndex >= redRoomIds.length) {
            nextIndex = 0;
        }

        const targetId = redRoomIds[nextIndex];
        
        // Сохраняем ID текущей отображаемой квартиры в кэш
        localStorage.setItem('last_shown_room_id', targetId.toString());

        // Отрисовываем её на холсте
        drawNumber(targetId);
    }

    function drawNumber(id) {
        // Очищаем холст ЧЕРНЫМ цветом
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000000'; // Изменено на черный
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (id === null) return;

        // Определяем размер шрифта в зависимости от количества цифр в ID
        let dynamicFontSize = 180;

        if (id >= 0 && id <= 9) {
            dynamicFontSize = 1200;
        } else if (id >= 10 && id <= 99) {
            dynamicFontSize = 1000;
        } else if (id >= 100 && id <= 999) {
            dynamicFontSize = 700;
        }

        // Применяем вычисленный динамический размер шрифта
        ctx.font = dynamicFontSize + 'px "AlehoScribble", Impact, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';

        // Рисуем одну цифру строго по центру БЕЛЫМ цветом
        ctx.fillStyle = '#ffffff';      // Текст остается белым
        ctx.shadowColor = '#ffffff';     // Свечение остается белым
        ctx.shadowBlur = 20;             
        ctx.fillText(id, centerX, centerY);
    }


    // Первый запуск при загрузке страницы
    updateData();
    
    // Каждые 10 секунд запрашиваем файл и переключаем цифру на следующую по порядку
  //  setInterval(updateData, 196000); 
</script>


</body>
</html>
