<!DOCTYPE html>
<html lang="ru">
<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖК Дмитриевский</title>
 <style>
		@font-face {
            font-family: 'Forresta';
            /* Браузер проверяет форматы по очереди. Название файла приведено к нижнему регистру без пробелов */
            src: url('forresta-personal-use.woff') format('woff'),
                 url('forresta-personal-use.ttf') format('truetype'),
                 url('forresta-personal-use.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: block; /* Предотвращает появление стандартного шрифта во время загрузки */
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viewport {
            width: 1080px;
            height: 1920px;
            background-color: #000;
            overflow: hidden;
            position: relative;
            transform-origin: center center;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

    </style>
</head>
<body>
<div style="font-family: 'Forresta'; opacity: 0.01; position: absolute; top: -999px; left: -999px;">0123456789</div>
<div id="viewport">    
    <canvas id="matrix" width="1080" height="1920"></canvas>
</div>
<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // --- ПАРАМЕТРЫ ОТОБРАЖЕНИЯ ---
    let redRoomIds = [];          
    let currentIdToDraw = null; // Храним ID текущей квартиры для постоянной перерисовки

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    async function getSharedData() {
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=469920882&single=true&output=csv'; // Ваша ссылка на таблицу
        const CACHE_KEY = 'sheet_data';
        const TIMESTAMP_KEY = 'sheet_timestamp';
        const TTL = 5 * 60 * 1000;

        const cached = localStorage.getItem(CACHE_KEY);
        const lastUpdate = localStorage.getItem(TIMESTAMP_KEY);
        const currentNow = Date.now();

        if (cached && lastUpdate && (currentNow - lastUpdate < TTL)) {
            return cached;
        }

        try {
            console.log('Фрейм делает сетевой запрос...');
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.text();
            localStorage.setItem(CACHE_KEY, data);
            localStorage.setItem(TIMESTAMP_KEY, currentNow.toString());
            return data;
        } catch (err) {
            console.error('Ошибка загрузки:', err);
            return cached || "";
        }
    }

    function updateData() {
        getSharedData().then(csv => {
            if (!csv) return;

            const rows = csv.split(/\r?\n/).filter(row => row.trim() !== "");
            
            // ИСПРАВЛЕНО: берем первую строку массива rows[0], чтобы разбить её на заголовки
            const headers = rows[0].split(",").map(h => h.trim().toLowerCase());
            
            const idIdx = headers.indexOf("id");
            const currentIdx = headers.indexOf("current");

            const currentRedList = [];
            
            rows.slice(1).forEach(rowStr => {
                const row = rowStr.split(",");
                const id = parseInt(row[idIdx]?.trim());
                const current = row[currentIdx]?.trim() || "0";
                
                if (!isNaN(id) && id >= 1 && id <= 192 && current === "0") {
                    currentRedList.push(id);
                }
            });

            redRoomIds = currentRedList.sort((a, b) => a - b);
            console.log('Данные обновлены. Красных квартир:', redRoomIds.length);

            selectNextNumber();
        });
    }

    function selectNextNumber() {
        if (redRoomIds.length === 0) {
            currentIdToDraw = null;
            return;
        }

        const lastShownId = parseInt(localStorage.getItem('last_shown_room_id'));
        let nextIndex = 0;

        if (!isNaN(lastShownId)) {
            const lastIndex = redRoomIds.indexOf(lastShownId);

            if (lastIndex !== -1) {
                nextIndex = lastIndex + 1;
            } else {
                nextIndex = redRoomIds.findIndex(id => id > lastShownId);
                if (nextIndex === -1) nextIndex = 0;
            }
        }

        if (nextIndex >= redRoomIds.length) {
            nextIndex = 0;
        }

        currentIdToDraw = redRoomIds[nextIndex];
        localStorage.setItem('last_shown_room_id', currentIdToDraw.toString());
    }

    // --- ФУНКЦИЯ ГЕНЕРАЦИИ ТВ-ШУМА ---
    function drawTVStatic() {
        const grainSize = 6; // Размер одного «зерна» шума в пикселях. Меньше — красивее, больше — быстрее работает.
        
        // Рисуем сетку случайных полупрозрачных квадратов поверх черного фона
        for (let x = 0; x < canvas.width; x += grainSize) {
            for (let y = 0; y < canvas.height; y += grainSize) {
                // Случайная яркость от глубокого черного до темно-серого
                const grayValue = Math.floor(Math.random() * 35); 
                // Случайная прозрачность для эффекта мерцания
                const alpha = Math.random() * 0.15; 
                
                ctx.fillStyle = `rgba(${grayValue}, ${grayValue}, ${grayValue}, ${alpha})`;
                ctx.fillRect(x, y, grainSize, grainSize);
            }
        }
    }

    // --- ПОСТОЯННЫЙ АНИМАЦИОННЫЙ ЦИКЛ ОБНОВЛЕНИЯ ЭКРАНА ---
    function renderLoop() {
        // 1. Очищаем экран базовым темно-серым цветом (подложка под шум)
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#969aa4';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Накладываем живой динамический шум ТВ-помех
        drawTVStatic();

        // 3. Если есть активный ID квартиры, рисуем его с глитч-эффектом поверх шума
        if (currentIdToDraw !== null) {
            let dynamicFontSize = 180;
		
            if (currentIdToDraw >= 0 && currentIdToDraw <= 9) {
                dynamicFontSize = 1500;
            } else if (currentIdToDraw >= 10 && currentIdToDraw <= 99) {
                dynamicFontSize = 1400;
            } else if (currentIdToDraw >= 100 && currentIdToDraw <= 999) {
                dynamicFontSize = 1160;
            }
            ctx.font = dynamicFontSize + 'px "Forresta", Impact, sans-serif';
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            // Красный силуэт влево-вниз
            ctx.fillStyle = '#ff0000';
            ctx.fillText(currentIdToDraw, centerX - 12, centerY + 4);

            // Бирюзовый силуэт вправо-вверх
            ctx.fillStyle = '#00ffff'; 
            ctx.fillText(currentIdToDraw, centerX + 8, centerY - 4);

            // Основной белый текст строго по центру
            ctx.fillStyle = '#ffffff';
            ctx.fillText(currentIdToDraw, centerX, centerY);
        }

        // Запрашиваем следующий кадр анимации (работает на частоте монитора, обычно 60 FPS)
        requestAnimationFrame(renderLoop);
    }

    function initializeApp() {
        updateData();
        //setInterval(updateData, 10000); // Обновляем данные и переключаем ID раз в 10 секунд
        
        // Запускаем бесконечный цикл отрисовки шума и текста
        renderLoop(); 
    }

    if (document.fonts) {
        document.fonts.ready.then(function() {
            console.log('Шрифт Sabotase готов. Запуск анимации шума.');
            initializeApp();
        });
    } else {
        window.onload = function() {
            setTimeout(initializeApp, 1000);
        };
    }
</script>

</body>
</html>
