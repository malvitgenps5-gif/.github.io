<!DOCTYPE html>
<html lang="ru">
<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖК Дмитриевский</title>
<style>
    @font-face {
        font-family: 'Forresta';
        src: url('forresta-personal-use.woff') format('woff'),
             url('forresta-personal-use.ttf') format('truetype'),
             url('forresta-personal-use.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #viewport {
        width: 1080px;
        height: 1920px;
        background-color: #000;
        overflow: hidden;
        position: relative;
        transform-origin: center center;
        flex-shrink: 0;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        /* Отключаем сглаживание: GPU аппаратно размножит пиксели до grainSize = 6 */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    /* Новый элемент для текста, обрабатываемый исключительно видеокартой */
    #glitch-text {
        position: absolute;
        top: 50%;
        left: 50%;
        /* Сдвиг на 50% назад для идеального центрирования + форсирование 3D слоя на GPU */
        transform: translate(-50%, -50%) translateZ(0);
        z-index: 2;
        font-family: 'Forresta', Impact, sans-serif;
        line-height: 1;
        text-align: center;
        color: #ffffff;
        pointer-events: none;
        white-space: nowrap;
        
        /* Хроматический сдвиг: красный влево-вниз (-12px 4px), бирюзовый вправо-вверх (8px -4px) */
        filter: drop-shadow(-12px 4px 0 #ff0000) drop-shadow(8px -4px 0 #00ffff);
    }

    /* Специфичные размеры шрифтов для разного количества символов */
    .font-single { font-size: 1500px; }
    .font-double { font-size: 1400px; }
    .font-triple { font-size: 1160px; }
    .glitch-hidden { display: none; }
</style>
</head>
<body>
<div style="font-family: 'Forresta'; opacity: 0.01; position: absolute; top: -999px; left: -999px;">0123456789</div>
<div id="viewport">
    <!-- Реальный размер холста уменьшен в 6 раз для оптимизации -->
    <canvas id="tv-canvas" width="180" height="320"></canvas>
    <div id="glitch-text" class="glitch-hidden"></div>
</div>

<script>
    // Получаем элементы и принудительно задаем низкое физическое разрешение холста
    // 1080 / 6 = 180, 1920 / 6 = 320. CSS растянет это обратно до 1080x1920 без размытия.
    const canvas = document.getElementById('tv-canvas');
    canvas.width = 54;   // 1080 / 20
    canvas.height = 96;  // 1920 / 20

    // Инициализируем контекст без поддержки альфа-канала для максимальной скорости рендеринга
    const ctx = canvas.getContext('2d', { alpha: false });
    const textElement = document.getElementById('glitch-text');

    const viewWidth = canvas.width;
    const viewHeight = canvas.height;

    // --- ПАРАМЕТРЫ ОТОБРАЖЕНИЯ И ДАННЫЕ ---
    let redRoomIds = [];          
    let currentIdToDraw = null; 

    // Шаблон базовой подложки цвета #969aa4 в формате памяти ABGR (Alpha, Blue, Green, Red)
    // 0xFF (Alpha) | 0xA4 (Blue) | 0x9A (Green) | 0x96 (Red)
    const baseImageData = ctx.createImageData(viewWidth, viewHeight);
    const baseBuffer = new Uint32Array(baseImageData.data.buffer);
    for (let i = 0; i < baseBuffer.length; i++) {
        baseBuffer[i] = 0xFF000000 | (0xA4 << 16) | (0x9A << 8) | 0x96;
    }

    // Постоянные буферы под текущий кадр во избежание утечек оперативной памяти
    const currentFrameData = ctx.createImageData(viewWidth, viewHeight);
    const currentBuffer = new Uint32Array(currentFrameData.data.buffer);

    async function getSharedData() {
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=469920882&single=true&output=csv';
        const CACHE_KEY = 'sheet_data';
        const TIMESTAMP_KEY = 'sheet_timestamp';
        const TTL = 5 * 60 * 1000;

        const cached = localStorage.getItem(CACHE_KEY);
        const lastUpdate = localStorage.getItem(TIMESTAMP_KEY);
        const currentNow = Date.now();

        if (cached && lastUpdate && (currentNow - lastUpdate < TTL)) {
            return cached;
        }

        try {
            console.log('Фрейм делает сетевой запрос...');
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.text();
            localStorage.setItem(CACHE_KEY, data);
            localStorage.setItem(TIMESTAMP_KEY, currentNow.toString());
            return data;
        } catch (err) {
            console.error('Ошибка загрузки:', err);
            return cached || "";
        }
    }

    function updateData() {
        getSharedData().then(csv => {
            if (!csv) return;

            const rows = csv.split(/\r?\n/).filter(row => row.trim() !== "");
            const headers = rows[0].split(",").map(h => h.trim().toLowerCase());
            
            const idIdx = headers.indexOf("id");
            const currentIdx = headers.indexOf("current");

            const currentRedList = [];
            
            rows.slice(1).forEach(rowStr => {
                const row = rowStr.split(",");
                const id = parseInt(row[idIdx]?.trim());
                const current = row[currentIdx]?.trim() || "0";
                
                if (!isNaN(id) && id >= 1 && id <= 192 && current === "0") {
                    currentRedList.push(id);
                }
            });

            redRoomIds = currentRedList.sort((a, b) => a - b);
            console.log('Данные обновлены. Красных квартир:', redRoomIds.length);

            selectNextNumber();
        });
    }

    function selectNextNumber() {
        if (redRoomIds.length === 0) {
            currentIdToDraw = null;
            return;
        }

        const lastShownId = parseInt(localStorage.getItem('last_shown_room_id'));
        let nextIndex = 0;

        if (!isNaN(lastShownId)) {
            const lastIndex = redRoomIds.indexOf(lastShownId);

            if (lastIndex !== -1) {
                nextIndex = lastIndex + 1;
            } else {
                nextIndex = redRoomIds.findIndex(id => id > lastShownId);
                if (nextIndex === -1) nextIndex = 0;
            }
        }

        if (nextIndex >= redRoomIds.length) {
            nextIndex = 0;
        }

        currentIdToDraw = redRoomIds[nextIndex];
        localStorage.setItem('last_shown_room_id', currentIdToDraw.toString());
    }

    // --- АППАРАТНЫЙ АНИМАЦИОННЫЙ ЦИКЛ ОБНОВЛЕНИЯ ЭКРАНА ---
    function renderLoop() {
        // 1. Быстро сбрасываем рабочий холст к базовому серому цвету
        currentBuffer.set(baseBuffer);

        // 2. Накладываем шум ТВ-помех за один быстрый проход цикла в памяти процессора
        const len = currentBuffer.length;
        for (let i = 0; i < len; i++) {
            const gray = Math.floor(Math.random() * 35);
            const alpha = Math.random() * 0.15;
            
            const bgPixel = currentBuffer[i];
            const bgR = bgPixel & 0xFF;
            const bgG = (bgPixel >> 8) & 0xFF;
            const bgB = (bgPixel >> 16) & 0xFF;
            
            // Быстрое попиксельное альфа-смешивание
            const outR = Math.floor(gray * alpha + bgR * (1 - alpha));
            const outG = Math.floor(gray * alpha + bgG * (1 - alpha));
            const outB = Math.floor(gray * alpha + bgB * (1 - alpha));
            
            currentBuffer[i] = 0xFF000000 | (outB << 16) | (outG << 8) | outR;
        }
        
        // Видеокарта мгновенно выводит готовую матрицу пикселей на дисплей
        ctx.putImageData(currentFrameData, 0, 0);

        // 3. Вывод текста силами графического чипа через DOM-ноду
        if (currentIdToDraw !== null) {
            // Чтобы не дергать DOM лишний раз, меняем текст только при изменении ID
            if (textElement.innerText !== String(currentIdToDraw)) {
                textElement.innerText = currentIdToDraw;
            }
            
            // Сбрасываем старые классы масштабирования
            textElement.className = '';
            
            // Назначаем класс размера шрифта в зависимости от разрядности числа
            if (currentIdToDraw >= 0 && currentIdToDraw <= 9) {
                textElement.classList.add('font-single');
            } else if (currentIdToDraw >= 10 && currentIdToDraw <= 99) {
                textElement.classList.add('font-double');
            } else if (currentIdToDraw >= 100 && currentIdToDraw <= 999) {
                textElement.classList.add('font-triple');
            }
        } else {
            textElement.className = 'glitch-hidden';
        }

        // Запрашиваем следующий кадр с частотой обновления развертки монитора
        requestAnimationFrame(renderLoop);
    }

    function initializeApp() {
        updateData();
        // setInterval(updateData, 10000); // Раскомментируйте, если требуется автоматическое обновление раз в 10 секунд
        
        renderLoop(); 
    }

    // Безопасная инициализация после загрузки шрифтов
    if (document.fonts) {
        document.fonts.ready.then(function() {
            console.log('Шрифты загружены. Запуск ТВ-эффектов через GPU.');
            initializeApp();
        });
    } else {
        window.onload = function() {
            setTimeout(initializeApp, 1000);
        };
    }
</script>

</body>
</html>
