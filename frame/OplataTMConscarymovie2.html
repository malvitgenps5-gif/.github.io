<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖК Дмитриевский</title>
<style>
	/* Подключение Comfortaa из кеша главной страницы */
	@font-face {
		font-family: 'Comfortaa';
		src: url('/.github.io/fonts/Comfortaa.woff2') format('woff2');
		font-weight: 300 700;
		font-style: normal;
		font-display: swap;
	}
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #viewport {
        width: 1080px;
        height: 1920px;
        background-color: #000000;
        overflow: hidden;
        position: relative;
        transform-origin: center center;
        flex-shrink: 0;
        
        /* Flexbox для вертикального выравнивания блоков */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 100px 0; /* Отступы сверху и снизу */
        box-sizing: border-box;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    /* Общий контейнер для текстовых блоков */
    .glitch-layer {
        position: relative;
        z-index: 2;
        font-family: 'Comfortaa', cursive;
        line-height: 1.1;
        text-align: center;
        color: #eec11e; /* Чистый белый для строгости */
        pointer-events: none;
        white-space: nowrap;
        transform: translateZ(0);
        /* Классическое анаглифное RGB расслоение (Красный и Циан) */
        filter: drop-shadow(10px -6px 0 #ffffff);
    }

    /* Верхний блок: Две строки текста */
    #phrase-container {
        position: relative;
        z-index: 2;
        font-family: 'Comfortaa', cursive;
        font-weight: bold; /* Жирный шрифт лучше читается на экранах ТВ */
        font-size: 100px; /* Подобранный размер для длинных стихов */
        line-height: 1.4;
        text-align: center;
        color: #eec11e; /* Чистый белый цвет */
        text-transform: uppercase;
        margin-top: 50px;
        width: 100%;
        max-width: 960px;
        white-space: normal;
        word-wrap: break-word;
        pointer-events: none;
    }

    /* Нижний блок: Цифры */
    #glitch-text {
        margin-bottom: 50px;
    }

    /* Размеры шрифтов для цифр в зависимости от длины */
    .font-single { font-size: 900px; }
    .font-double { font-size: 750px; }
    .font-triple { font-size: 650px; }
    .glitch-hidden { display: none; }
</style>
</head>
<body>
<div id="viewport">
    <canvas id="tv-canvas" width="180" height="320"></canvas>
    
    <!-- Верхний блок для случайного текста -->
    <div id="phrase-container">
        <div id="phrase-line1"></div>
        <div id="phrase-line2"></div>
    </div>

    <!-- Нижний блок для цифр -->
    <div id="glitch-text" class="glitch-layer glitch-hidden"></div>
</div>

<script>
// Элементы интерфейса
const textElement = document.getElementById('glitch-text');
const line1 = document.getElementById('phrase-line1');
const line2 = document.getElementById('phrase-line2');

// --- ПАРАМЕТРЫ ОТОБРАЖЕНИЯ И ДАННЫЕ ---
let redRoomIds = [];
let currentIdToDraw = null;

// Массив с парами строк для случайного вывода сверху
const textPairs = [
    ["Консьерж на месте круглый год,", "Оплаты вашей очень ждет!"],
    ["Чтоб в подъезде было чисто,", "Внесите взнос консьержу быстро!"],
    ["Помнить нужно про уют - ", "Оплатите скромный труд!"],
    ["Чистый холл, цветы, уют -", "Оплатите этот труд!"],
    ["За охрану и уют", "Деньги вовремя сдают!"],
    ["Заказ пристроит на столе,", "Пока ты спишь в тепле"],
    ["Закладчик в угол не нырнёт —", "Его консьерж метлой прибьёт"],
    ["Искать наркотик здесь не смей,", "Консьерж прогонит злых людей"],
    ["Окурок бросил мимо урны —", "Консьерж ответит некультурно"],
    ["Расчёт наличкой на посту —", "И сразу видно чистоту"],
    ["Жильцов он любит всей душой,", "Платёж внеси — и спи, родной"],
    ["Мы платим честно за покой,", "Встречает нас консьерж благой"],
    ["За скромный взнос на этот быт", "Консьерж чаёчком угостит"],
    ["Копейку сдали на уют —", "Тебя с улыбкой дома ждут"],
    ["Консьержу ручку позолоти —", "И на тележке в лифт кати"],
    ["Консьерж на кнопку нажимает —", "И с теплотой жильцов встречает"],
    ["Магнитный ключ искать не надо —", "Консьерж откроет, мы и рады"]
];

// --- НОВАЯ ФУНКЦИЯ-ПРИЕМНИК ДЛЯ СВЯЗИ С ГЛАВНОЙ СТРАНИЦЕЙ ---
// Главная страница автоматически вызывает её без перезагрузки сети каждый раз при показе фрейма
window.updateFrameData = function(pageData) {
    console.log('Фрейм получил команду на обновление данных локально.');
    // Читаем свежий CSV прямо из LocalStorage, куда его сохраняет главная страница
    const csv = localStorage.getItem('sheet_data');
    if (!csv) return;

    // Парсим данные
    const rows = csv.split(/\r?\n/).filter(row => row.trim() !== "");
    const headers = rows[0].split(",").map(h => h.trim().toLowerCase());
    const idIdx = headers.indexOf("id");
    const currentIdx = headers.indexOf("current");
    const currentRedList = [];

    rows.slice(1).forEach(rowStr => {
        const row = rowStr.split(",");
        const id = parseInt(row[idIdx]?.trim());
        const current = row[currentIdx]?.trim() || "0";
        if (!isNaN(id) && id >= 1 && id <= 192 && current === "0") {
            currentRedList.push(id);
        }
    });

    redRoomIds = currentRedList.sort((a, b) => a - b);
    console.log('Данные успешно пересчитаны. Красных квартир:', redRoomIds.length);
    
    // Выбираем следующую квартиру и обновляем экран
    selectNextNumber();
};

function selectNextNumber() {
    if (redRoomIds.length === 0) {
        currentIdToDraw = null;
        if (textElement) textElement.className = 'glitch-hidden';
        return;
    }

    const lastShownId = parseInt(localStorage.getItem('last_shown_room_id'));
    let nextIndex = 0;

    if (!isNaN(lastShownId)) {
        const lastIndex = redRoomIds.indexOf(lastShownId);
        if (lastIndex !== -1) {
            nextIndex = lastIndex + 1;
        } else {
            nextIndex = redRoomIds.findIndex(id => id > lastShownId);
            if (nextIndex === -1) nextIndex = 0;
        }
    }

    if (nextIndex >= redRoomIds.length) {
        nextIndex = 0;
    }

    currentIdToDraw = redRoomIds[nextIndex];
    localStorage.setItem('last_shown_room_id', currentIdToDraw.toString());
    
    // Перерисовываем элементы интерфейса
    updateUI();
}

function updateRandomText() {
    if (!line1 || !line2) return;
    const randomPair = textPairs[Math.floor(Math.random() * textPairs.length)];
    line1.textContent = randomPair[0];
    line2.textContent = randomPair[1];
}

// Вся работа с DOM
function updateUI() {
    if (!textElement) return;
    if (currentIdToDraw !== null) {
        textElement.innerText = currentIdToDraw;
        textElement.className = 'glitch-layer';
        
        if (currentIdToDraw >= 0 && currentIdToDraw <= 9) {
            textElement.classList.add('font-single');
        } else if (currentIdToDraw >= 10 && currentIdToDraw <= 99) {
            textElement.classList.add('font-double');
        } else if (currentIdToDraw >= 100 && currentIdToDraw <= 999) {
            textElement.classList.add('font-triple');
        }
    } else {
        textElement.className = 'glitch-hidden';
    }
    updateRandomText();
}

// Первичный запуск при старте (чтобы фрейм не был пустым до первого переключения слайдов)
function initializeApp() {
    window.updateFrameData(); 
}

// Безопасная инициализация после загрузки шрифтов
if (document.fonts) {
    document.fonts.ready.then(function() {
        console.log('Шрифты загружены. Запуск приложения.');
        initializeApp();
    });
} else {
    window.onload = function() {
        setTimeout(initializeApp, 1000);
    };
}
</script>



</body>
</html>
