<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЖК Дмитриевский</title>  
  <! Предзагрузка локального шрифта для кеширования -->
  <link rel="preload" href="/.github.io/fonts/LEVIBRUSH.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/.github.io/fonts/Comfortaa.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/.github.io/fonts/Roboto.woff2" as="font" type="font/woff2" crossorigin>
	
  <style> 
    @font-face { 
      font-family: 'LeviBrush'; 
      src: url('/.github.io/fonts/LEVIBRUSH.woff2') format('woff2'); 
      font-weight: normal; 
      font-style: normal; 
      font-display: swap; 
    }
	  
    /* Локальный Comfortaa */
    @font-face {
      font-family: 'Comfortaa';
      src: url('/.github.io/fonts/Comfortaa.woff2') format('woff2');
      font-weight: 300 700; /* Поддержка вариативного диапазона весов */
      font-style: normal;
      font-display: swap;
    }
	/* Локальный Roboto (для Windows/iOS, а на Android подхватится из системы) */
	@font-face {
	font-family: 'RobotoLocal';
	src: url('/.github.io/fonts/Roboto.woff2') format('woff2');
	font-weight: normal;
	font-style: normal;
	font-display: swap;
	}
	  
    /* Стили для контейнера и плавного переключения фреймов */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000; /* Фон при переключении */
    }
    .frame-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }
    .my-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease; /* Плавное растворение */
    }
    .my-frame.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div id="container" class="frame-container">
    <!-- Фреймы создаются автоматически скриптом -->
  </div>

<script>
// !!! ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ НА CSV ИЗ GOOGLE ТАБЛИЦ !!!
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=469920882&single=true&output=csv'; 

const CACHE_KEY = 'sheet_data';
const TIMESTAMP_KEY = 'sheet_timestamp';
const TTL = 5 * 60 * 1000; // 5 минут кеша для данных таблицы

async function getSharedData() {
  const cached = localStorage.getItem(CACHE_KEY);
  const lastUpdate = parseInt(localStorage.getItem(TIMESTAMP_KEY), 10);
  const now = Date.now();

  if (cached && lastUpdate && (now - lastUpdate < TTL)) {
    console.log('Данные CSV взяты из LocalStorage');
    return cached;
  }

  try {
    console.log('Сетевой запрос за новым CSV...');
    const response = await fetch(CSV_URL);
    const data = await response.text();
    localStorage.setItem(CACHE_KEY, data);
    localStorage.setItem(TIMESTAMP_KEY, now.toString());
    return data;
  } catch (err) {
    console.error('Ошибка загрузки CSV, взят старый кеш:', err);
    return cached;
  }
}

let pages = [];
let current = 0;
let timerId = null;

// Парсинг полученной CSV строки
function parseCSV(csv) {
  const rows = csv.split("\n").map(r => r.split(","));
  const headers = rows[0].map(h => h.trim());
  const urlIdx = headers.indexOf("url");
  const durationIdx = headers.indexOf("duration");

  return rows.slice(1)
    .map(row => ({
      url: row[urlIdx]?.trim() || "",
      duration: parseInt(row[durationIdx]?.trim(), 10) || 30000
    }))
    .filter(page => page.url !== "" && !isNaN(page.duration));
}

// Создание только уникальных фреймов в DOM
function createAllFrames() {
  const container = document.getElementById("container");
  container.innerHTML = ""; 

  // Убираем дубликаты URL для экономии памяти
  const uniqueUrls = [...new Set(pages.map(page => page.url))];

  uniqueUrls.forEach((url) => {
    const iframe = document.createElement("iframe");
    // Хешируем URL в безопасную строку для использования в ID
    iframe.id = `frame_${btoa(url).replace(/=/g, '')}`; 
    iframe.src = "frame/" + url;
    iframe.className = "my-frame";
    iframe.tabIndex = "-1"; 
    container.appendChild(iframe);
  });
  
  console.log(`Массив шагов: ${pages.length}. Создано уникальных фреймов в DOM: ${uniqueUrls.length}`);
}

// Показ следующего слайда (порядок из CSV полностью сохранен)
function showNext() {
  if (pages.length === 0) return;

  // Скрываем старый активный фрейм
  const activeFrame = document.querySelector(".my-frame.active");
  if (activeFrame) {
    activeFrame.classList.remove("active");
    activeFrame.tabIndex = "-1";
  }

  const currentPage = pages[current];
  const frameId = `frame_${btoa(currentPage.url).replace(/=/g, '')}`;
  const nextFrame = document.getElementById(frameId);
  
  if (nextFrame) {
    nextFrame.classList.add("active");
    nextFrame.tabIndex = "0";
  } else {
    console.error(`Фрейм для URL ${currentPage.url} не найден в DOM`);
  }

  // Переходим к следующему элементу по кругу
  current = (current + 1) % pages.length;

  // Запуск таймера для этого слайда
  timerId = setTimeout(showNext, currentPage.duration);
}

// Принудительное обновление содержимого фреймов из сети (для GitHub Pages)
function reloadAllFrames() {
  console.log("Принудительное обновление контента страниц внутри фреймов...");
  const frames = document.querySelectorAll(".my-frame");
  
  frames.forEach(iframe => {
    const baseUrl = iframe.src.split('?')[0]; 
    // Добавление ?v= заставляет браузер игнорировать кеш GitHub Pages
    iframe.src = baseUrl + "?v=" + Date.now();
  });
}

// Фоновое обновление списка страниц из CSV
async function refreshPagesList() {
  const csv = await getSharedData();
  if (!csv) return;

  const newPages = parseCSV(csv);
  if (newPages.length > 0) {
    // Проверяем, изменился ли сам состав URL-адресов
    const oldUrls = pages.map(p => p.url).join(',');
    const newUrls = newPages.map(p => p.url).join(',');

    pages = newPages;
    console.log('Список шагов обновлен в фоне. Всего:', pages.length);

    // Если состав ссылок изменился, перестраиваем фреймы в DOM
    if (oldUrls !== newUrls) {
      console.log('Состав страниц изменился, перестраиваем фреймы...');
      createAllFrames();
    }
  }
}

// Старт приложения при первой загрузке
getSharedData().then(csv => {
  if (!csv) return;
  pages = parseCSV(csv);

  if (pages.length > 0) {
    createAllFrames();
    showNext();
  }
});

// ТАЙМЕРЫ АВТООБНОВЛЕНИЯ CONTEXT
setInterval(refreshPagesList, 360000);  // Проверка таблицы CSV каждые 6 минут
setInterval(reloadAllFrames, 3600000);  // Перезагрузка файлов страниц из сети каждый 1 час
</script>
</body>
</html>
