<div class="header">
Оплата консьержа НК3 <span id="current-month"></span>

<div class="content-item" id="grid2"></div>


<script>

const now = new Date();
const month = String(now.getMonth() + 1).padStart(2, '0'); // Добавляет 0, если месяц < 10
const year = now.getFullYear();
document.getElementById('current-month').innerText = `${month}/${year}`;

  
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=469920882&single=true&output=csv"

    async function loadData() {

    const res = await fetch(sheetURL)
        const text = await res.text()

        const rows = text.trim().split("\n").slice(1)

        const data = rows.map(r => {
            const[id, current, prev, next] = r.split(",")

                return {
                id: String(id),
                current: Number(current),
                prev: Number(prev),
                next: Number(next)
            }
        })

        render(data)
		render2(data)
}

function render(data) {

    const grid = document.getElementById("grid")
        grid.innerHTML = ""

        data.forEach(item => {

            const cell = document.createElement("div")
				
				if (String(item.id).toLowerCase().includes('i')) { 
				cell.className = "cell gold"			
				cell.innerHTML = `<div>${item.id.replace("i", "")}</div>`
				
				}
				else if (item.id === "0") {
				cell.className = "pust"
				}
				else {
                cell.className = "cell " +  (item.current == 1 ? "green" : "red")

                cell.innerHTML = `

								<div class="number">${item.id}</div>

								<div class="circles">

								<div class="circle ${item.prev==1?"green":"red"}"></div>

								<div class="circle ${item.next==1?"green":"red"}"></div>

								</div>
								`
				}
                grid.appendChild(cell)

        })

}

function render2(data) {
		const filteredArray = data.filter(item => item.id !== "0" && !String(item.id).includes('i') && item.current == 0);
		filteredArray.sort((a, b) => a.id - b.id);
		 // [10, 5, 'тест'] console.log(filteredArray);
            
		const grid2 = document.getElementById("grid2")       
		grid2.innerHTML = ""

        filteredArray.forEach(item => {

            
				
				if (String(item.id).toLowerCase().includes('i')) { 		
				}
				else if (item.id === "0") {
				}

				const cell = document.createElement("div")
				
                cell.className = "cell2 " +  (item.current == 1 ? "green" : "red")

                cell.innerHTML = `

								<div class="number2">${item.id}</div>
							
								`
				grid2.appendChild(cell)
				}
                

        })

}


loadData()

      /*  items[currentIndex].classList.remove('active');

        items[currentIndex].classList.add('active');*/
    
		console.log(currentIndex);
		
		if (currentIndex == 0) {

		document.getElementsByClassName("header")[0].style.color="#111827";
		} else {
		document.getElementsByClassName("header")[0].style.background="#111827";
		document.getElementsByClassName("header")[0].style.color="white";
		}
		
		
	  items[currentIndex].style.display = 'none';
