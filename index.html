<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Слайдер с плавным переходом</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    .frame {
      position: absolute;
      width: 100%;
      height: 100vh;
      border: none;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease; /* длительность fade */
	 /* background: black;*/
	  
    }

    .active {
      opacity: 1;
      z-index: 2;
    }
  </style>
</head>
<body>

<iframe id="frame1" class="frame active"></iframe>
<iframe id="frame2" class="frame"></iframe>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQJOCD4_INUxusWkaSaPbGhGBh5tMVAylQrQ4zYLK7DYunMhYkxOpC9mm4phbM3xKqmo073qzGgntE/pub?gid=1363299470&single=true&output=csv";

let pages = [];
let current = 0;
let activeFrame = 1;

fetch(url)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").map(r => r.split(","));
    const headers = rows[0];

    pages = rows.slice(1).map(row => {
      let obj = {};
      headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
      return obj;
    });

    startSlider();
  });

function startSlider() {
  if (pages.length === 0) return;

  showNext();
}

function showNext() {
  const page = pages[current];
  const duration = parseInt(page.duration) || 30000;

  const frame1 = document.getElementById("frame1");
  const frame2 = document.getElementById("frame2");

  let currentFrame = activeFrame === 1 ? frame1 : frame2;
  let nextFrame = activeFrame === 1 ? frame2 : frame1;

  // загружаем следующую страницу в скрытый iframe
  nextFrame.src = "frame/" + page.url;

  // ждём загрузку
  nextFrame.onload = () => {
    nextFrame.classList.add("active");
    currentFrame.classList.remove("active");

    // переключаем активный iframe
    activeFrame = activeFrame === 1 ? 2 : 1;

    current = (current + 1) % pages.length;

    setTimeout(showNext, duration);
  };
}

setInterval(() => {
  location.reload();
}, 60000); // обновлять список каждую минуту

</script>

</body>
</html>
